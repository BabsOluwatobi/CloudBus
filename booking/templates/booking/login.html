{% extends 'booking/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <!-- Header -->
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">Welcome Back</h2>
            <p class="text-muted">Access your Azure Bus Pass Dashboard</p>
        </div>
        
        <!-- Login Card -->
        <div class="card border-0 shadow-sm p-4" style="border-radius: 15px;">
            <form method="POST">
                {% csrf_token %}
                
                <div class="login-form-style">
                    {{ form.as_p }}
                </div>
                
                <div class="d-grid gap-2 mt-4">
                    <!-- Standard Login Button -->
                    <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                        Login to Account
                    </button>
                    
                    
        
        <!-- Bottom Link -->
        <div class="text-center mt-4">
            <p class="small text-muted">
                Don't have an account? 
                <a href="{% url 'register' %}" class="text-primary fw-bold text-decoration-none">Register here</a>
            </p>
        </div>
    </div>
</div>

<style>
    /* Ensures Django fields look consistent with the rest of the app */
    .login-form-style p {
        margin-bottom: 1.2rem;
    }
    
    .login-form-style label {
        font-weight: 500;
        margin-bottom: 5px;
        color: #475569;
        display: block;
    }
    
    .login-form-style input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background-color: #ffffff;
        transition: all 0.2s;
    }

    .login-form-style input:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* Standardizing button heights */
    .btn-lg {
        padding: 12px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 8px;
    }

    /* Hover effect for Microsoft button */
    .btn-outline-dark:hover {
        background-color: #f8fafc;
        color: #000;
        border-color: #000;
    }
</style>
{% endblock %}
