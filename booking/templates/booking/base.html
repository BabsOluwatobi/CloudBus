<!DOCTYPE html>
<html>
<head>
    <title>Cloud Bus Pass Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7ff; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #0f172a; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .nav-link-custom { color: #cbd5e1; margin-left: 15px; text-decoration: none; transition: 0.3s; display: inline-block; }
        .nav-link-custom:hover { color: #38bdf8; }
        .user-pill { background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.2); padding: 4px 12px; border-radius: 50px; font-size: 13px; font-weight: 500; }
        .dashboard-wrapper { margin-top: 30px; }
        .content-card { background: white; border-radius: 18px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: 25px; min-height: 300px; }
        .btn-logout { background: none; border: none; color: #cbd5e1; cursor: pointer; }
        footer { text-align: center; margin-top: 50px; padding: 20px; color: #6b7280; font-size: 14px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand text-white" href="{% url 'home' %}">🚍 BusPass Azure</a>
        <div class="d-flex align-items-center">
            {% if user.is_authenticated %}
                <span class="user-pill me-3">👤 {{ user.username }}</span>
                <a href="{% url 'dashboard' %}" class="nav-link-custom">Dashboard</a>
                <form action="{% url 'logout' %}" method="post" class="d-inline ms-3">
                    {% csrf_token %}
                    <button type="submit" class="btn-logout nav-link-custom">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="nav-link-custom">Login</a>
                <a href="{% url 'register' %}" class="nav-link-custom">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container dashboard-wrapper">
    <div class="content-card">
        <!-- ONLY ONE CONTENT BLOCK HERE -->
        {% block content %}
        {% endblock %}
    </div>
</div>

<footer>
    Designed by <strong>Oluwatobi Babarinde</strong> | Powered by Microsoft Azure
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
