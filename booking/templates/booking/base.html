<!DOCTYPE html>
<html>
<head>
    <title>Cloud Bus Pass</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (NEW) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { 
            background: #f4f7ff; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
        }
        
        /* Premium Glassmorphism Navbar */
        .navbar { 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }

        .brand-icon {
            color: #38bdf8;
            margin-right: 8px;
            font-size: 1.6rem;
        }

        /* Modern Navigation Links */
        .nav-link-custom { 
            color: #cbd5e1; 
            text-decoration: none; 
            transition: all 0.3s ease; 
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .nav-link-custom:hover { 
            color: #ffffff; 
            background: rgba(255,255,255,0.05);
            transform: translateY(-1px);
        }

        /* Upgraded User Pill */
        .user-pill { 
            background: linear-gradient(135deg, #38bdf8 0%, #6366f1 100%);
            color: white; 
            padding: 6px 18px 6px 8px; 
            border-radius: 50px; 
            font-size: 14px; 
            font-weight: 600; 
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .user-avatar {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .btn-logout { 
            background: none; 
            border: none; 
            cursor: pointer; 
            width: 100%;
        }

        /* Register Highlight Button */
        .nav-register-btn {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }
        
        .nav-register-btn:hover {
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
        }

        /* General layout styles */
        .dashboard-wrapper { margin-top: 30px; }
        .content-card { background: white; border-radius: 18px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: 25px; min-height: 300px; }
        footer { text-align: center; margin-top: 50px; padding: 20px; color: #6b7280; font-size: 14px; }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <!-- Brand Logo & Text -->
        <a class="navbar-brand text-white d-flex align-items-center" href="{% url 'home' %}">
            <i class="bi bi-bus-front-fill brand-icon"></i> CloudBus Azure
        </a>
        
        <!-- Mobile Toggle Button -->
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Nav Links -->
        <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
            <div class="d-flex align-items-center flex-column flex-lg-row mt-3 mt-lg-0 gap-2">
                
                {% if user.is_authenticated %}
                    <!-- User Profile Pill -->
                    <div class="user-pill me-lg-3 mb-2 mb-lg-0">
                        <div class="user-avatar">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        {{ user.username }}
                    </div>
                    
                    <a href="{% url 'dashboard' %}" class="nav-link-custom mb-2 mb-lg-0">
                        <i class="bi bi-grid-1x2-fill"></i> Dashboard
                    </a>
                    
                    <form action="{% url 'logout' %}" method="post" class="m-0 p-0 w-100 w-lg-auto">
                        {% csrf_token %}
                        <button type="submit" class="btn-logout nav-link-custom text-start">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </form>
                    
                {% else %}
                    <a href="{% url 'login' %}" class="nav-link-custom mb-2 mb-lg-0">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </a>
                    <a href="{% url 'register' %}" class="nav-link-custom nav-register-btn w-100 w-lg-auto">
                        <i class="bi bi-person-plus-fill"></i> Register
                    </a>
                {% endif %}
                
            </div>
        </div>
    </div>
</nav>

<!-- Page Content -->
<div class="container dashboard-wrapper">
    <div class="content-card border-0">
        {% block content %}
        {% endblock %}
    </div>
</div>

<!-- Footer -->
<footer>
    Designed by <strong>Oluwatobi Babarinde</strong> | Powered by Microsoft Azure
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
