{% extends 'booking/base.html' %}
{% block content %}
    <h2>My Bookings</h2>
    <a href="{% url 'book_pass' %}" class="btn btn-primary mb-3">Book New Pass</a>
    <table class="table table-striped">
        <tr><th>Source</th><th>Destination</th><th>Date</th></tr>
        {% for pass in passes %}
        <tr>
            <td>{{ pass.source }}</td>
            <td>{{ pass.destination }}</td>
            <td>{{ pass.travel_date }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="3">No passes booked yet.</td></tr>
        {% endfor %}
    </table>
{% endblock %}
